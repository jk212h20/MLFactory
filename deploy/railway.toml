# Railway config for the MLFactory AZ service.
# See https://docs.railway.com/guides/config-as-code for full schema.

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn mlfactory.service.app:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
